<!DOCTYPE html>
<html>
  <head>
    <title>pctopc-client</title>
    <link rel="icon" href="../assets/goofyIcon.png">
    <link rel="stylesheet" href="../style.css">
  </head>
  <body>
    <p>Client Page</p>
    <p>Buttons</p>
    <input id = "textInput" placeholder="type in room id">
    <br>
    <button id = "sendBtn">Send</button>
    <button id = "closeBtn">Close</button>
    <br>
    <button id = "pointerBtn">Lock Pointer</button>
    <button id = "fullScreenBtn">Fullscreen</button>
    <button id = "pointScreenBtn">Fullscreen + Pointer</button>
    <br>
    <label>Volume Slider (0 to mute)</label>
    <input type="range" id="volumeSlider" min="0" max="100" value="100">
    <label id = "volumeLabel">100%</label>
    <p>Errors:</p>
    <textarea id="errorBox" readonly></textarea>
    <br>
    <video id = "videoPlayer" autoplay playsinline src=""></video>
    <script src="../js/client.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mux.js/dist/mux.js"></script>
  </body>
</html>
